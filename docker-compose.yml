services:

  server:
    build:
      context: .
      dockerfile: src/FixOrderBooking.Server/Dockerfile
    ports:
      - "5000:5000" # HTTP API
      - "5001:5001" # FIX acceptor (TCP)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5000' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  client:
    build:
      context: .
      dockerfile: src/FixOrderBooking.Client/Dockerfile
    environment:
      ServerBaseUrl: http://server:5000
      FIX__ServerHost: server
    ports:
      - "5100:5100" # HTTP API
      - "5002:5002" # FIX acceptor (TCP)
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5100' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
